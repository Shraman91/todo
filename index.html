<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DO IT — Todo List</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="noise"></div>

  <main>
    <header>
      <div class="header-top">
        <span class="label">TASK MANAGER</span>
        <span class="date" id="dateDisplay"></span>
      </div>
      <h1>DO<br>IT.</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-num" id="totalCount">0</span>
          <span class="stat-label">total</span>
        </div>
        <div class="stat-divider">/</div>
        <div class="stat">
          <span class="stat-num" id="doneCount">0</span>
          <span class="stat-label">done</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </header>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="80" autocomplete="off" />
      <button id="addBtn" aria-label="Add task">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>

    <ul id="taskList"></ul>

    <div class="empty-state" id="emptyState">
      <span>— nothing here —</span>
    </div>

    <footer>
      <button id="clearDone">Clear completed</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
